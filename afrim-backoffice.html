<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#ca8a04"/>
<title>AFRIM PAY — Back-office</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--y:#ca8a04;--y2:#a16207;--y3:#fef3c7;--t:#111827;--m:#6b7280;--r:#ef4444;--g:#22c55e}
body{min-height:100vh;background:#f9fafb;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--t)}
#app{max-width:430px;margin:0 auto;min-height:100vh}
.scr{display:none;flex-direction:column;min-height:100vh}
.scr.on{display:flex}
.inp{width:100%;background:#f3f4f6;border:1.5px solid #e5e7eb;border-radius:12px;padding:14px 16px;font-size:15px;font-family:inherit;color:var(--t);outline:none}
.inp:focus{border-color:var(--y)}
.btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-y{background:linear-gradient(135deg,var(--y2),var(--y));color:#fff}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d1d5db;display:inline-block;margin:0 6px;transition:.15s}
.pin-dot.on{background:var(--y);border-color:var(--y)}
.pin-key{padding:18px;border-radius:16px;border:none;background:#f3f4f6;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--t)}
.pin-key:active{background:#e5e7eb}
.pin-key.empty{background:none;cursor:default}
.spin{width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:var(--y);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#111827;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;transition:.3s;white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--r)}
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>

<div class="scr" id="s-login" style="justify-content:center;align-items:center;padding:32px 24px">
  <div style="width:100%;max-width:340px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:80px;height:80px;border-radius:20px;overflow:hidden;margin:0 auto 14px;box-shadow:0 8px 24px rgba(202,138,4,.2)">
        <img src="https://samassivaladji-cmyk.github.io/afrim-pay-apps/logo.png" style="width:100%;height:100%;object-fit:contain" alt="AFRIM PAY"/>
      </div>
      <h1 style="font-size:24px;font-weight:900">AFRIM PAY</h1>
      <p style="color:var(--m);font-size:13px;margin-top:4px">Back-office Administration</p>
      <div style="margin-top:10px;background:var(--y3);border:1px solid #fde68a;border-radius:99px;padding:4px 14px;display:inline-block;font-size:11px;font-weight:700;color:var(--y2)">Admin · Superviseur · Support</div>
    </div>
    <div id="err-login" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:var(--r);padding:12px;border-radius:12px;margin-bottom:14px;font-size:13px"></div>
    <label style="font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block">Numero de telephone</label>
    <input class="inp" id="lg-tel" type="tel" placeholder="+225 07 XX XX XX" inputmode="numeric" style="margin-bottom:14px"/>
    <button class="btn btn-y" onclick="goPin()">Continuer</button>
  </div>
</div>

<div class="scr" id="s-pin" style="justify-content:center;align-items:center;padding:32px 24px">
  <div style="width:100%;max-width:320px;text-align:center">
    <button onclick="showScr('s-login')" style="background:none;border:none;color:var(--m);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:28px;display:block">Retour</button>
    <h2 style="font-size:22px;font-weight:800;margin-bottom:6px">Code PIN</h2>
    <div id="pin-sub" style="color:var(--m);font-size:14px;margin-bottom:28px;font-family:monospace"></div>
    <div id="err-pin" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:var(--r);padding:10px;border-radius:12px;margin-bottom:14px;font-size:13px"></div>
    <div id="pin-loading" style="display:none;padding:20px"><div class="spin"></div></div>
    <div id="pin-keys">
      <div style="margin-bottom:28px">
        <span class="pin-dot" id="d0"></span><span class="pin-dot" id="d1"></span><span class="pin-dot" id="d2"></span><span class="pin-dot" id="d3"></span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        <button class="pin-key" onclick="PIN(1)">1</button><button class="pin-key" onclick="PIN(2)">2</button><button class="pin-key" onclick="PIN(3)">3</button>
        <button class="pin-key" onclick="PIN(4)">4</button><button class="pin-key" onclick="PIN(5)">5</button><button class="pin-key" onclick="PIN(6)">6</button>
        <button class="pin-key" onclick="PIN(7)">7</button><button class="pin-key" onclick="PIN(8)">8</button><button class="pin-key" onclick="PIN(9)">9</button>
        <button class="pin-key empty"></button><button class="pin-key" onclick="PIN(0)">0</button><button class="pin-key" onclick="DELP()">X</button>
      </div>
    </div>
  </div>
</div>

<div class="scr" id="s-home">
  <div style="background:linear-gradient(135deg,var(--y2),var(--y));padding:48px 20px 28px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <div style="color:rgba(255,255,255,.75);font-size:12px;font-weight:600;text-transform:uppercase">Administration</div>
        <div style="color:#fff;font-size:20px;font-weight:800;margin-top:2px" id="h-name">--</div>
      </div>
      <button onclick="logout()" style="background:rgba(255,255,255,.18);border:none;border-radius:12px;width:40px;height:40px;cursor:pointer;color:#fff;font-size:18px">X</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px">
        <div style="color:rgba(255,255,255,.75);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Utilisateurs</div>
        <div style="color:#fff;font-size:26px;font-weight:900" id="h-users">--</div>
      </div>
      <div style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px">
        <div style="color:rgba(255,255,255,.75);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Transactions</div>
        <div style="color:#fff;font-size:26px;font-weight:900" id="h-txns">--</div>
      </div>
      <div style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px">
        <div style="color:rgba(255,255,255,.75);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Commissions</div>
        <div style="color:#fff;font-size:16px;font-weight:800" id="h-comm">--</div>
      </div>
      <div style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px">
        <div style="color:rgba(255,255,255,.75);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Alertes</div>
        <div style="color:#fff;font-size:26px;font-weight:900" id="h-alertes">--</div>
      </div>
    </div>
  </div>
  <div style="padding:24px;text-align:center">
    <div style="background:#ecfdf5;border:1px solid #a7f3d0;border-radius:14px;padding:16px;color:#059669;font-size:14px;font-weight:600;margin-bottom:16px">
      Connexion reussie - Suite du dashboard en cours
    </div>
    <button onclick="logout()" class="btn" style="background:#fef2f2;color:var(--r);border:1px solid #fecaca">Se deconnecter</button>
  </div>
</div>

</div>

<script>
var API='https://afrim-pay-backend.onrender.com/api/v1';
var G={token:null,refresh:null,user:null,pin:''};
try{G.token=localStorage.getItem('afrim_token');G.refresh=localStorage.getItem('afrim_refresh');G.user=JSON.parse(localStorage.getItem('afrim_user')||'null');}catch(e){}

function showScr(id){
  var all=document.querySelectorAll('.scr');
  for(var i=0;i<all.length;i++)all[i].classList.remove('on');
  var el=document.getElementById(id);
  if(el)el.classList.add('on');
  window.scrollTo(0,0);
}

function toast(msg,err){
  var el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.className=err?'on err':'on';
  clearTimeout(toast._t);
  toast._t=setTimeout(function(){el.className='';},2800);
}

function goPin(){
  var tel=document.getElementById('lg-tel').value.trim();
  if(!tel){toast('Entrez votre numero',true);return;}
  G.pin='';
  document.getElementById('pin-sub').textContent=tel;
  document.getElementById('err-pin').style.display='none';
  rDots();showScr('s-pin');
}

function PIN(n){if(G.pin.length>=4)return;G.pin+=String(n);rDots();if(G.pin.length===4)setTimeout(doLogin,300);}
function DELP(){G.pin=G.pin.slice(0,-1);rDots();}
function rDots(){for(var i=0;i<4;i++){var d=document.getElementById('d'+i);if(d)d.classList.toggle('on',G.pin.length>i);}}

async function doLogin(){
  var tel=document.getElementById('lg-tel').value.trim();
  var errEl=document.getElementById('err-pin');errEl.style.display='none';
  document.getElementById('pin-loading').style.display='';
  document.getElementById('pin-keys').style.display='none';
  try{
    var resp=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telephone:tel,pin:G.pin})});
    var data=await resp.json();
    if(!resp.ok)throw new Error(data.message||'Erreur connexion');
    var ok=['admin','superviseur','support_client','support_tech'];
    if(ok.indexOf(data.data.user.role)===-1)throw new Error('Acces non autorise');
    G.token=data.data.accessToken;G.refresh=data.data.refreshToken;G.user=data.data.user;
    localStorage.setItem('afrim_token',G.token);
    localStorage.setItem('afrim_refresh',G.refresh);
    localStorage.setItem('afrim_user',JSON.stringify(G.user));
    document.getElementById('pin-loading').style.display='none';
    document.getElementById('pin-keys').style.display='';
    G.pin='';rDots();
    enterApp();
  }catch(e){
    G.pin='';rDots();
    errEl.textContent=e.message;errEl.style.display='';
    document.getElementById('pin-loading').style.display='none';
    document.getElementById('pin-keys').style.display='';
  }
}

function enterApp(){
  var u=G.user;if(!u)return;
  document.getElementById('h-name').textContent=(u.prenom||'')+' - '+(u.role||'').toUpperCase();
  showScr('s-home');
  setTimeout(function(){toast('Bienvenue '+u.prenom);},400);
  loadStats();
}

async function loadStats(){
  try{
    var resp=await fetch(API+'/admin/overview',{headers:{'Authorization':'Bearer '+G.token}});
    var data=await resp.json();
    if(data.data){
      document.getElementById('h-users').textContent=data.data.users||'0';
      document.getElementById('h-txns').textContent=data.data.txns||'0';
      document.getElementById('h-comm').textContent=Number(data.data.totalCommissions||0).toLocaleString('fr-FR')+' F';
      document.getElementById('h-alertes').textContent=data.data.alertes||'0';
    }
  }catch(e){}
}

function logout(){
  try{fetch(API+'/auth/logout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+G.token},body:JSON.stringify({refreshToken:G.refresh})});}catch(e){}
  G.token=G.refresh=G.user=null;G.pin='';
  try{localStorage.removeItem('afrim_token');localStorage.removeItem('afrim_refresh');localStorage.removeItem('afrim_user');}catch(e){}
  showScr('s-login');
}

(function(){
  if(G.token&&G.user){var ok=['admin','superviseur','support_client','support_tech'];if(ok.indexOf(G.user.role)>=0){enterApp();return;}}
  showScr('s-login');
})();
</script>
</body>
</html>
